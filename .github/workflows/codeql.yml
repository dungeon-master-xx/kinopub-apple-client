name: CodeQL

# Free security/code scanning for public repos. Results show up under the Security tab.
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '27 4 * * 1'   # weekly, Monday 04:27 UTC

permissions:
  security-events: write
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      # Deterministic build (CodeQL traces the compiler) — same command CI uses.
      - name: Build for CodeQL
        run: |
          xcodebuild \
            -project KinoPubAppleClient.xcodeproj \
            -scheme KinoPubAppleClient \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
