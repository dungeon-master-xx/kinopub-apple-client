name: Lint

# SwiftLint + swift-format style checks. Informational (not a required check) so it surfaces issues
# as annotations without blocking merges while the codebase is brought up to standard.
on:
  push:
    branches: [ main ]
    paths: [ '**/*.swift', '.swiftlint.yml', '.swift-format', '.github/workflows/lint.yml' ]
  pull_request:
    branches: [ main ]
    paths: [ '**/*.swift', '.swiftlint.yml', '.swift-format' ]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # Don't burn minutes on fork PRs automatically.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: SwiftLint
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint version
            swiftlint lint --quiet || true
          else
            echo "::notice::SwiftLint not available on this runner image — skipping."
          fi

      - name: swift-format lint
        run: |
          if command -v swift-format >/dev/null 2>&1; then
            swift-format lint --recursive --parallel . || true
          elif swift format --version >/dev/null 2>&1; then
            swift format lint --recursive --parallel . || true
          else
            echo "::notice::swift-format not available — skipping."
          fi
